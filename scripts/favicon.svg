<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Black background -->
  <rect width="64" height="64" fill="#000000"/>

  <!-- Matrix-style cascading numbers background -->
  <text x="2" y="12" font-family="monospace" font-size="8" fill="#003300" opacity="0.6">1010</text>
  <text x="18" y="20" font-family="monospace" font-size="8" fill="#003300" opacity="0.5">0110</text>
  <text x="34" y="16" font-family="monospace" font-size="8" fill="#003300" opacity="0.6">1101</text>
  <text x="50" y="24" font-family="monospace" font-size="8" fill="#003300" opacity="0.5">0011</text>

  <!-- Superman "S" shield outline -->
  <path d="M 32 8 L 50 18 L 50 46 L 32 56 L 14 46 L 14 18 Z"
        fill="none"
        stroke="#00FF41"
        stroke-width="2"/>

  <!-- Inner shield -->
  <path d="M 32 12 L 46 20 L 46 44 L 32 52 L 18 44 L 18 20 Z"
        fill="#001100"/>

  <!-- Superman "S" symbol - Matrix style -->
  <path d="M 26 24 L 38 24 L 38 28 L 30 28 L 30 32 L 38 32 L 38 36 L 30 36 L 30 40 L 38 40 L 26 40 L 26 36 L 34 36 L 34 32 L 26 32 Z"
        fill="#00FF41"
        filter="url(#glow)"/>

  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Matrix rain effect - small dots -->
  <circle cx="10" cy="50" r="0.8" fill="#00FF41" opacity="0.8"/>
  <circle cx="22" cy="54" r="0.8" fill="#00FF41" opacity="0.6"/>
  <circle cx="42" cy="52" r="0.8" fill="#00FF41" opacity="0.7"/>
  <circle cx="54" cy="48" r="0.8" fill="#00FF41" opacity="0.5"/>

  <!-- Scan line effect -->
  <line x1="14" y1="32" x2="50" y2="32" stroke="#00FF41" stroke-width="0.5" opacity="0.3"/>
</svg>
